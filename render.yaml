services:
  # ── Redis ─────────────────────────────────────────────────────────────────
  - type: redis
    name: paper-analyzer-redis
    plan: free
    ipAllowList: []

  # ── Backend ───────────────────────────────────────────────────────────────
  - type: web
    name: paper-analyzer-backend
    env: node
    branch: main
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm run start
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: paper-analyzer-redis
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false

  # ── Frontend (Static Site) ────────────────────────────────────────────────
  - type: web
    name: paper-analyzer-frontend
    env: static
    branch: main
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        sync: false
