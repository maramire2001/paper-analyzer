services:
  # ── Backend ──────────────────────────────────────────────────────────
  - type: web
    name: paper-analyzer-backend
    env: node
    branch: main
    plan: free
    buildCommand: npm install --prefix frontend && npm run build --prefix frontend && npm install --prefix backend
    startCommand: cd backend && npm run start
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: paper-analyzer-redis
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false   # Pegar tu Groq API key en el dashboard de Render



# ── Redis ─────────────────────────────────────────────────────────────
redis:
  - name: paper-analyzer-redis
    plan: free
