services:
  # ── Backend ──────────────────────────────────────────────────────────
  - type: web
    name: paper-analyzer-backend
    env: node
    branch: main
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm run start
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: paper-analyzer-redis
          property: connectionString
      - key: NODE_ENV
        value: production

  # ── Frontend (Static Site) ───────────────────────────────────────────
  - type: web
    name: paper-analyzer-frontend
    env: static
    branch: main
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        sync: false   # Pegar la URL del backend luego del primer deploy (ej: https://paper-analyzer-backend.onrender.com)

# ── Redis ─────────────────────────────────────────────────────────────
redis:
  - name: paper-analyzer-redis
    plan: free
